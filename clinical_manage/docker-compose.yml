services:
  clinical_manage_service:
    build:
      context: ..
      dockerfile: ./clinical_manage/Dockerfile
    container_name: clinical_manage_service
    restart: always
    expose:
      - "8000"
    env_file: ../.env
    environment:
      - POSTGRES_SERVER=postgres_db
      - REDIS_HOST=redis_db
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
    volumes:
      - ./app:/app/clinical_manage/app
      - ../common:/app/common
      - ./alembic.ini:/app/clinical_manage/alembic.ini
      - ./alembic:/app/clinical_manage/alembic
      - ./entrypoint.sh:/app/clinical_manage/entrypoint.sh
    entrypoint: ["/app/clinical_manage/entrypoint.sh"]