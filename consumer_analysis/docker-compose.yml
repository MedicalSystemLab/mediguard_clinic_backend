services:
  consumer_analysis:
    build:
      context: ..
      dockerfile: consumer_analysis/Dockerfile
    container_name: mediguard-consumer-analysis
    restart: always
    ports:
      - "8001"
    env_file:
      - ../.env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
      - POSTGRES_SERVER=postgres_db
    depends_on:
      postgres_db:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
