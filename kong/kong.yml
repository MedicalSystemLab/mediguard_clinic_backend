_format_version: "3.0"
services:
  - name: auth-service
    url: http://auth_service:8000
    routes:
      - name: auth-route
        paths:
          - /api/v1/auth
        strip_path: false

  - name: user-service
    url: http://user_service:8000
    routes:
      - name: user-route
        paths:
          - /api/v1/user
        strip_path: false

  - name: biosignal-service
    url: http://biosignal_service:8000
    routes:
      - name: biosignal-route
        paths:
          - /api/v1/biosignal
        strip_path: false
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp

plugins:
  - name: jwt
    config:
      key_claim_name: iss
      claims_to_verify:
        - exp

  - name: acme
    config:
      account_email: admin@heartmark.com
      tos_accepted: true
      domains:
        - api.heartmark.com
      storage: postgres

consumers:
  - username: heartmark-app
    jwt_secrets:
      - key: heartmark-auth
        secret: ${SECRET_KEY}
