services:
  auth_service:
    build:
      context: ..
      dockerfile: ./auth/Dockerfile
    container_name: auth_service
    restart: always
    expose:
      - "8000"
    env_file: ../.env
    environment:
      - POSTGRES_SERVER=postgres_db
      - REDIS_HOST=redis_db
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
    volumes:
      - ./app:/app/auth/app
      - ../common:/app/common
      - ./alembic.ini:/app/auth/alembic.ini
      - ./alembic:/app/auth/alembic
      - ./entrypoint.sh:/app/auth/entrypoint.sh
    entrypoint: ["/app/auth/entrypoint.sh"]